services:
  mysql:
    image: mysql:8.0
    container_name: festiverse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: festiverse
      MYSQL_USER: festiverse
      MYSQL_PASSWORD: festiverse1234
    ports:
      - "3360:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
