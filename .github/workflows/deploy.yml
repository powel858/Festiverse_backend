name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Festiverse_backend
            git pull origin master
            docker build -t festiverse-app .
            docker rm -f festiverse-app || true
            docker run -d --name festiverse-app --env-file .env -p 8000:8000 --restart always festiverse-app
